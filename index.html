<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script defer src="scripts.js"></script>
    
</head>
<body>
    <div id="heading">
        <h1>ROCK, PAPER, SCISSORS!</h1>
    </div>

    <div id="message">
        <p>Can you beat the computer?</p>
    </div>
    
    <div id="scores">
        <div id="player">Player: 0</div>
        <div id="computer">Computer: 0</div>
    </div>

    <div id="choice">
        <button id="rock"><span>Rock</span></button>
        <button id="paper"><span>Paper</span></button>
        <button id="scissors"><span>Scissors</span></button>
    </div>
    
</body>
</html>
